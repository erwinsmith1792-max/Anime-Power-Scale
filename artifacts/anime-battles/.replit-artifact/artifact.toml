kind = "web"
previewPath = "/"
title = "Anime Power Battles"
version = "1.0.0"
id = "artifacts/anime-battles"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19312

[services.development]
run = "pnpm --filter @workspace/anime-battles run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/anime-battles", "run", "build" ]
publicDir = "artifacts/anime-battles/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19312"
BASE_PATH = "/"
